<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wegogo</title>
    <style>
        * {
            text-align: center;
            color: white;
        }
        body, button {
            background-color: #1f1f1f;
        }
        textarea, input {
            color: #1f1f1f;
        }
    </style>
</head>
<body onload="getURL(); getPosts()">
    <h1>Wegogo</h1>
    <a href="info.html"><button>Information Center</button></a> <a href="rules.html"><button>Rules</button></a>
    <p>The URL to post to must include a slash at the end and https:// (or http://) at the beginning.</p>
    <p>By posting, you agree to our <a href="tos.html">Rules</a>.</p>
    <div>
        <textarea required autocomplete="none" id="username" maxlength="15" placeholder="name (see rule 5)"></textarea><br>
        <!--<button type="button" id="save-name-button">save</button><br>-->
        <textarea id="message" maxlength="125" placeholder="text" required></textarea><br>
        <textarea id="url" placeholder="https://example.com/ (this is saved when you send or fetch posts!)" required></textarea><br>
        <button onclick="postPost()">Send your masterpiece</button>
        <button onclick="getPosts()">Fetch posts</button>
        <button onclick="gregGreg()" id="greg-button">greg</button>
    </div>
    <hr>
    <script src="js/posts.js"></script>
    <script src="js/getURL.js"></script>
</body>
</html>
