<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wegogo</title>
    <style>
        * {
            text-align: center;
            color: white;
        }
        body, button {
            background-color: #1f1f1f;
        }
        textarea, input {
            color: #1f1f1f;
        }
    </style>
</head>
<body onload="getPosts()">
    <h1>Wegogo</h1>
    <div>
        <textarea autocomplete="none" id="username" maxlength="15" placeholder="name (optional) + see rule 5"></textarea><br>
        <!--<button type="button" id="save-name-button">save</button><br>-->
        <textarea id="message" maxlength="212" placeholder="text" required></textarea><br>
        <button onclick="postPost()">Send your masterpiece</button>
        <button id="greg-button">greg</button>
    </div>
    <ul id="messages"></ul>
    <script src="js/postpost.js"></script>
    <script src="js/getposts.js"></script>
</body>
</html>
